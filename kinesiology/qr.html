<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小テスト QRコード｜運動学実習</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #1a5276;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    h1 {
      color: #fff;
      font-size: 22px;
      margin-bottom: 32px;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .qr-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .qr-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 20px 20px;
      text-align: center;
      width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .qr-num {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .qr-title {
      font-size: 14px;
      font-weight: bold;
      color: #1a5276;
      margin-bottom: 16px;
      line-height: 1.5;
      min-height: 42px;
    }
    .qr-card img {
      width: 200px;
      height: 200px;
      display: block;
      margin: 0 auto 16px;
    }
    .qr-url {
      font-size: 10px;
      color: #aaa;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>運動学実習 小テスト</h1>

<div class="qr-grid" id="qr-grid"></div>

<script>
  const BASE_URL = "https://inojima.github.io/class/kinesiology/quiz.html";

  const quizzes = [
    { id: 1, title: "小テスト①\nRを使ったデータ解析" },
    { id: 2, title: "小テスト②\n筋力・フォースプレートを使った評価指標" },
    { id: 3, title: "小テスト③\n三次元動作解析・フォースプレート内蔵トレッドミル" }
  ];

  const grid = document.getElementById("qr-grid");

  quizzes.forEach(q => {
    const url = `${BASE_URL}?id=${q.id}`;
    const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=10&data=${encodeURIComponent(url)}`;

    const card = document.createElement("div");
    card.className = "qr-card";
    card.innerHTML = `
      <div class="qr-num">小テスト ⑤{q.id}</div>
      <div class="qr-title">${q.title.replace("\n", "<br>")}</div>
      <img src="${qrSrc}" alt="QRコード 小テスト${q.id}">
      <div class="qr-url">${url}</div>
    `;
    // qr-numの番号を修正
    card.querySelector(".qr-num").textContent = `小テスト ${"①②③"[q.id - 1]}`;
    grid.appendChild(card);
  });
</script>

</body>
</html>
